spring.application.name=APIgateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true


spring.cloud.gateway.routes[0].id=order-service
spring.cloud.gateway.routes[0].uri=lb://OrderService
spring.cloud.gateway.routes[0].predicates[0]=Path=/v1/order-api/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/v1/order-api/(?<segment>.*),/api/v1/orders/$\{segment}